{% extends 'base.html' %}

{% block content %}

<style>

.hero-section{
    background: linear-gradient(
        135deg,
        #0f172a,
        #1e293b,
        #334155
    );

    color: white;

    padding: 80px 60px;

    border-radius: 20px;

    box-shadow:
        0 10px 30px rgba(0,0,0,0.3);

    overflow: hidden;
}

.hero-section h1{
    font-size: 3.2rem;
}

.hero-section p{
    color: #cbd5e1;
}

.floating-ai{
    animation: float 4s ease-in-out infinite;
    filter: drop-shadow(
        0 0 20px rgba(59,130,246,0.6)
    );
}

@keyframes float{

    0%{
        transform: translateY(0px);
    }

    50%{
        transform: translateY(-15px);
    }

    100%{
        transform: translateY(0px);
    }

}

.feature-card{

    background: #1e293b;

    color: white;

    border: none;

    border-radius: 15px;

    padding: 25px;

    text-align: center;

    transition: 0.3s;
}

.feature-card:hover{

    transform: translateY(-5px);

    background: #334155;
}

.feature-icon{

    font-size: 40px;

    margin-bottom: 15px;
}

</style>


<div class="hero-section">

    <div class="row align-items-center">

        <div class="col-md-6">

            <h1 class="fw-bold">
                🤖 GenAI IT Service Desk Assistant
            </h1>

            <p class="lead mt-4">

                Intelligent IT Support powered by AI.

                Instantly resolve technical issues,
                search the knowledge base,
                create incidents,
                and automate service desk operations.

            </p>

            <div class="mt-4">

                <a
                    href="/dashboard/"
                    class="btn btn-primary btn-lg me-2">

                    📊 Dashboard

                </a>

                <a
                    href="/assistant/"
                    class="btn btn-outline-light btn-lg">

                    🤖 AI Assistant

                </a>

            </div>

        </div>

        <div class="col-md-6 text-center">

            <img
                src="https://cdn-icons-png.flaticon.com/512/4712/4712109.png"
                width="350"
                class="floating-ai">

        </div>

    </div>

</div>
{% endblock %}
