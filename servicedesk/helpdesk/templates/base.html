<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GenAI IT Service Desk Assistant</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

    body{
        background:#f4f7fc;
        font-family:'Segoe UI',sans-serif;
    }

    /* NAVBAR */

    .navbar{
        background:linear-gradient(
            135deg,
            #2563eb,
            #7c3aed,
            #06b6d4
        );
        box-shadow:0 3px 15px rgba(0,0,0,0.15);
    }

    .navbar-brand{
        font-size:1.4rem;
        font-weight:700;
        color:white !important;
    }

    .nav-btn{
        margin-left:8px;
        border-radius:20px;
        font-size:14px;
        padding:8px 15px;
    }

    /* PAGE CONTENT */

    .main-container{
        padding-top:30px;
        padding-bottom:30px;
    }

    /* CARDS */

    .card{
        border:none;
        border-radius:18px;
        box-shadow:0 4px 20px rgba(0,0,0,0.08);
        transition:0.3s;
    }

    .card:hover{
        transform:translateY(-5px);
    }

    /* HERO SECTION */

    .hero-section{

        padding:70px;

        border-radius:25px;

        color:white;

        background:linear-gradient(
            135deg,
            #2563eb,
            #7c3aed,
            #06b6d4
        );

        background-size:300% 300%;

        animation:gradientMove 10s ease infinite;
    }

    @keyframes gradientMove{

        0%{
            background-position:0% 50%;
        }

        50%{
            background-position:100% 50%;
        }

        100%{
            background-position:0% 50%;
        }

    }

    /* FLOATING ANIMATION */

    .floating-ai{

        animation:float 3s ease-in-out infinite;

    }

    @keyframes float{

        0%{
            transform:translateY(0px);
        }

        50%{
            transform:translateY(-20px);
        }

        100%{
            transform:translateY(0px);
        }

    }

    /* STAT CARDS */

    .stat-card{
        text-align:center;
        padding:20px;
    }

    .stat-card h2{
        font-weight:700;
        color:#2563eb;
    }

    /* FOOTER */

    footer{

        margin-top:50px;
        padding:20px;

        text-align:center;

        color:#666;
    }

</style>

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark">

<div class="container">

    <a class="navbar-brand" href="/">
        🤖 GenAI Service Desk
    </a>

    <div>

        <a class="btn btn-light nav-btn"
           href="/">
           Home
        </a>

        <a class="btn btn-light nav-btn"
           href="/dashboard/">
           Dashboard
        </a>

        <a class="btn btn-light nav-btn"
           href="/create/">
           Create Incident
        </a>

        <a class="btn btn-light nav-btn"
           href="/knowledge/">
           Knowledge Base
        </a>

        <a class="btn btn-light nav-btn"
           href="/search/">
           Search
        </a>

        <a class="btn btn-warning nav-btn"
           href="/assistant/">
           AI Assistant
        </a>

    </div>

</div>


</nav>

<div class="container main-container">


{% block content %}
{% endblock %}


</div>

<footer>

<hr>

<p>
    © 2026 GenAI IT Service Desk Assistant |
    Developed By Narapati Nandhini Nilohita
</p>

</footer>

</body>

</html>
